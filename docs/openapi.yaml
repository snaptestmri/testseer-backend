    LocalIndexTriggerRequest:
      type: object
      description: Request to index all Java files in a server-accessible directory
      properties:
        catalogLibraryId:
          type: string
          description: Optional workspace.yml catalogLibraries id when multiple libs
            share one repo
          example: platform-bigquery
        orgId:
          type: string
          description: GitHub organisation identifier
          example: acme
        path:
          type: string
          description: Absolute path on the server filesystem to the project root
          example: /workspace/orders
        serviceModuleId:
          type: string
          description: Optional workspace.yml serviceModules id for monorepo index
            targets
          example: partner-adapter-suite
      required:
      - orgId
      - path
    LocalIndexTriggerResponse:
      type: object
      description: Result of a local folder indexing operation
      properties:
        autoRegistered:
          type: boolean
          description: True if the service was newly registered during this request;
            false if it already existed
          example: true
        commitSha:
          type: string
          description: "Git commit SHA at the indexed directory, or 'local-{epoch}'\
            \ if not a git repo"
          example: d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3
        configFileCount:
          type: integer
          format: int32
          description: Number of YAML application config and .proto files submitted
            for messaging analysis
          example: 31
        ddlFileCount:
          type: integer
          format: int32
          description: Number of DDL/SQL files submitted (catalog libraries with indexDdl)
          example: 12
        fileCount:
          type: integer
          format: int32
          description: Number of .java files found and submitted for analysis
          example: 47
        openApiFileCount:
          type: integer
          format: int32
          description: Number of OpenAPI/JSON spec files submitted (catalog libraries
            with indexOpenApi)
          example: 298
        serviceId:
          type: string
          description: Stable service identifier (UUID) assigned at registration
          example: a3f2e1b4-9c8d-4e2f-b1a3-7d6e5f4c3b2a
        serviceName:
          type: string
          description: Service name derived from the directory name
          example: orders
