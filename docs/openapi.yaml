          default: service
      - description: Graph node ID (class/method/service)
        in: query
        name: nodeId
        required: false
        schema:
          type: string
      - description: Class FQN — resolved to class node when nodeId omitted
        in: query
        name: symbolFqn
        required: false
        schema:
          type: string
