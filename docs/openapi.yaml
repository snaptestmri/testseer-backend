openapi: 3.0.1
info:
  contact:
    email: team@testseer.io
    name: TestSeer Team
  description: "TestSeer analyses Java service codebases to produce a structured knowledge\
    \ graph of classes, endpoints, and outbound HTTP calls. Use the Query API to ask\
    \ questions about your services — reachability, impact analysis, shared type consumers\
    \ — and always get freshness metadata alongside results."
  license:
    name: Proprietary
  title: TestSeer API
  version: 0.1.0
servers:
- description: Local development
  url: http://localhost:8080
tags:
- description: Auto-register services by scanning a GitHub organisation
  name: Admin — Discovery
- description: Trigger on-demand indexing of Java services
  name: Admin — Indexing
- description: Clear or rebuild indexed facts
  name: Admin — Indexing
- description: Replay failed ingestion jobs
  name: Admin — Jobs
- description: Org-scoped catalog library and service module configuration (CFG-CAT)
  name: Admin — Workspace Catalog
- description: Impact analysis and test planning based on the indexed knowledge graph
  name: Analysis
- description: Index-complete push for IDE clients (BL-024)
  name: Notifications
- description: Static consistency scenarios (CON Phase 1)
  name: Query — Consistency Hints
- description: Contract operation to inbound handler entry-flow trace (BL-046 P3)
  name: Query — Contract Entry Flow
- description: OpenAPI contract vs Java inbound REST reconciliation (BL-046 P2)
  name: Query — Contract Gaps
- description: Partner API contract inventory from riq-platform-apis-optimus (BL-046)
  name: Query — Contract Operations
- description: Persistence entity/document catalog from library indexes (WRK-18)
  name: Query — Data Object Catalog
- description: Catalog vs DDL drift report (WRK-23)
  name: Query — Data Object Gaps
- description: Inbound entry triggers and entry-flow trace (TRG P1)
  name: Query — Entry Triggers
- description: Retrieve indexed facts about classes and outbound HTTP calls
  name: Query — Facts
- description: "Graph traversal queries: reachability, impact, neighbourhood, shared\
    \ types"
  name: Query — Graph
- description: Ingestion job lifecycle status
  name: Query — Jobs
- description: Maven module and artifact dependency facts (BL-058)
  name: Query — Maven dependencies
- description: "Pub/Sub inventory, event flow, gates, and validation hints (Option\
    \ C)"
  name: Query — Messaging Flow
- description: Portfolio-wide indexing freshness summary
  name: Query — Org Status
- description: Test class gap detection (P12)
  name: Query — Portfolio Gaps
- description: Service indexing freshness and metadata
  name: Query — Status
- description: Register and manage services for TestSeer analysis
  name: Service Registry
- description: GitHub webhook receiver for push and pull_request events
  name: Webhook
paths:
  /admin/discover:
    post:
      description: "Scans every non-archived, non-fork repository in the organisation.\
        \ Repositories containing a pom.xml (MAVEN) or build.gradle (GRADLE) at the\
        \ root are auto-registered in the service registry. Already-registered services\
        \ are reported in alreadyKnown and are not modified. Non-Java repos are reported\
        \ in skipped. Runs synchronously — large organisations may take several seconds."
      operationId: discover
      parameters:
      - description: GitHub organisation login (e.g. 'acme')
        in: query
        name: orgId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiscoveryResult"
          description: Discovery complete
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DiscoveryResult"
          description: orgId parameter is missing
      summary: Discover and register all Java services in a GitHub org
      tags:
      - Admin — Discovery
  /admin/maven/backfill-links:
    post:
      description: |-
        Re-runs InternalArtifactLinker against existing maven_dependency_facts for the latest
        commit per service without a full re-index. Optionally syncs OWNED_BY graph edges.
      operationId: backfillMavenLinks
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MavenLinkBackfillRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MavenLinkBackfillResponse"
          description: OK
      summary: Backfill maven dependency linkedServiceId
      tags:
      - Admin — Maven
  /admin/index/clear:
    post:
      description: |-
        Removes indexed facts so you can re-index cleanly.
        scope=SERVICE (default): all facts + graph for one serviceId.
        scope=MESSAGING: Option C facts only (pubsub, schema, gates, etc.).
        scope=ORG: all facts for orgId; set includeRegistry=true to also remove service_registry rows.
        Does not delete shared TOPIC/SUBSCRIPTION graph nodes that other services may reference.
      operationId: clear
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexClearRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexClearResponse"
          description: OK
      summary: Clear indexed facts
      tags:
      - Admin — Indexing
  /admin/index/local:
    post:
      description: "Indexes all `.java` files found recursively under the given server-accessible\
        \ directory path. If the service is not yet registered, it is auto-registered\
        \ using the directory name as the service name and detecting the build tool\
        \ from `pom.xml` or `build.gradle`. The git commit SHA is resolved from the\
        \ directory's git history; if the path is not a git repository, a `local-{epoch}`\
        \ pseudo-SHA is used. Runs synchronously — returns when indexing is complete.\
        \ Use `GET /v1/status/{serviceId}` to verify freshness afterwards."
      operationId: trigger_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalIndexTriggerRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/LocalIndexTriggerResponse"
          description: Indexing complete
        "400":
          content:
            '*/*':
              schema:
                type: string
                example: "Path is not a directory: /bad/path"
          description: Path is not a directory or request fields are blank
      summary: Index a local folder
      tags:
      - Admin — Indexing
  /admin/index/{serviceId}:
    delete:
      operationId: clearServiceById
      parameters:
      - in: path
        name: serviceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexClearResponse"
          description: OK
      summary: Clear indexed facts for one service (shortcut)
      tags:
      - Admin — Indexing
    post:
      description: "Fetches all .java files from GitHub using the Git Trees API and\
        \ publishes an analysis job to Kafka. The job runs asynchronously — this endpoint\
        \ returns immediately with a jobId. Track progress via GET /v1/status/{serviceId}.\
        \ Returns 409 if a QUEUED or RUNNING job already exists for the service."
      operationId: trigger
      parameters:
      - description: Unique service identifier
        in: path
        name: serviceId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexTriggerRequest"
      responses:
        "202":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: Job queued successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: Service not found
        "409":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: A job is already in progress for this service
      summary: Trigger on-demand indexing for a registered service
      tags:
      - Admin — Indexing
  /admin/jobs/{jobId}/replay:
    post:
      description: Re-queues a new MANUAL index job for the same service and commit
        as the DLQ job.
      operationId: replay
      parameters:
      - in: path
        name: jobId
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: Replay job queued
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: Job not found
        "409":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IndexTriggerResponse"
          description: Job is not in DLQ status
      summary: Replay a DLQ ingestion job
      tags:
      - Admin — Jobs
  /registry/services:
    get:
      description: Returns all registered services across all organisations.
      operationId: listAll
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceEntry"
          description: List of services
      summary: List all services
      tags:
      - Service Registry
    post:
      description: Registers a new service for indexing. Returns the assigned serviceId.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
        required: true
      responses:
        "201":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceEntry"
          description: Service registered successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceEntry"
          description: Invalid registration request
      summary: Register a service
      tags:
      - Service Registry
  /registry/services/{serviceId}:
    delete:
      description: "Disables a service, stopping future indexing jobs."
      operationId: disable
      parameters:
      - description: Unique service identifier
        in: path
        name: serviceId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Service disabled
      summary: Disable a service
      tags:
      - Service Registry
    get:
      operationId: getById
      parameters:
      - description: Unique service identifier
        in: path
        name: serviceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceEntry"
          description: Service found
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceEntry"
          description: Service not found
      summary: Get a service by ID
      tags:
      - Service Registry
    patch:
      operationId: update
      parameters:
      - description: Unique service identifier
        in: path
        name: serviceId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistryUpdateRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceEntry"
          description: Service updated
      summary: Update service metadata
      tags:
      - Service Registry
  /v1/catalog/data-objects:
    get:
      operationId: getDataObjects
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: storeType
        required: false
        schema:
          type: string
      - in: query
        name: physicalName
        required: false
        schema:
          type: string
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int32
      - in: query
        name: offset
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopePageResultDataObjectView"
          description: OK
      summary: Data object catalog (entity/document → store → physical name)
      tags:
      - Query — Data Object Catalog
  /v1/catalog/schema-objects:
    get:
      operationId: getSchemaObjects
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: storeType
        required: false
        schema:
          type: string
      - in: query
        name: physicalName
        required: false
        schema:
          type: string
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int32
      - in: query
        name: offset
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopePageResultSchemaObjectView"
          description: OK
      summary: DDL schema objects indexed from riq-platform-db (Phase 5)
      tags:
      - Query — Data Object Catalog
  /v1/consistency/scenarios:
    get:
      operationId: getScenarios
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: pattern
        required: false
        schema:
          type: string
      - in: query
        name: flowStep
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListConsistencyScenarioView"
          description: OK
      summary: "Consistency scenarios for a service (mirror, dual-write, rule pack)"
      tags:
      - Query — Consistency Hints
  /v1/facts/by-file:
    get:
      description: "Returns all indexed symbols (CLASS, ENDPOINT) for the given file\
        \ paths within a service. Used by the MCP server to map GitHub PR changed\
        \ files to their indexed endpoints and classes."
      operationId: getByFile
      parameters:
      - description: Service identifier
        in: query
        name: serviceId
        required: true
        schema:
          type: string
      - description: File paths to look up
        in: query
        name: filePaths
        required: false
        schema:
          type: array
          items:
            type: string
      - description: Organisation ID
        in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - description: Repository name
        in: query
        name: repo
        required: false
        schema:
          type: string
          default: ""
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListSymbolFactView"
          description: Symbols found (may be empty if files not indexed)
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListSymbolFactView"
          description: Service not indexed
      summary: Get symbol facts for specific file paths
      tags:
      - Query — Facts
  /v1/facts/class:
    get:
      description: "Returns all indexed symbol facts for the given class FQN within\
        \ a service. Results are Redis-cached. Returns 404 if the service has never\
        \ been indexed, 202 if indexing is currently in progress."
      operationId: getClassFacts
      parameters:
      - description: Service identifier
        in: query
        name: serviceId
        required: true
        schema:
          type: string
      - description: "Fully-qualified class name, e.g. com.example.OrdersController"
        in: query
        name: symbolFqn
        required: true
        schema:
          type: string
      - description: Organisation ID
        in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - description: Repository name
        in: query
        name: repo
        required: false
        schema:
          type: string
          default: ""
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListSymbolFactView"
          description: Facts returned
        "202":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListSymbolFactView"
          description: Indexing in progress — stale data may be returned
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListSymbolFactView"
          description: Service not indexed
      summary: Get symbol facts for a class
      tags:
      - Query — Facts
  /v1/facts/contract-operations:
    get:
      description: "OpenAPI operations indexed from riq-platform-apis-optimus. Filter\
        \ by catalog library serviceId or implementing serviceId, optional specDomain."
      operationId: getContractOperations
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: specDomain
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListContractOperationView"
          description: OK
      summary: Partner API contract operations
      tags:
      - Query — Contract Operations
  /v1/facts/contract-operations/linked:
    get:
      description: Same as contract-operations plus linked inbound handler when implementation
        is indexed.
      operationId: getLinkedContractOperations
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: specDomain
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListContractOperationLinkedView"
          description: OK
      summary: Contract operations with entry-trigger links
      tags:
      - Query — Contract Entry Flow
  /v1/facts/contract-schemas:
    get:
      description: "JSON schema summaries indexed from riq-platform-apis-optimus,\
        \ including nested field paths."
      operationId: getContractSchemas
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: schemaId
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListContractSchemaView"
          description: OK
      summary: Partner API contract JSON schemas
      tags:
      - Query — Contract Operations
  /v1/facts/data-access:
    get:
      operationId: getDataAccess
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListDataAccessView"
          description: OK
      summary: Data access facts along event handlers (C-P3)
      tags:
      - Query — Messaging Flow
  /v1/facts/entry-triggers:
    get:
      description: REST/webhook ingress points that can start processing in a service.
      operationId: getEntryTriggers
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: env
        required: false
        schema:
          type: string
      - in: query
        name: triggerKind
        required: false
        schema:
          type: string
      - in: query
        name: actor
        required: false
        schema:
          type: string
      - in: query
        name: boundary
        required: false
        schema:
          type: string
      - in: query
        name: orgId
        required: false
        schema:
          type: string
      - in: query
        name: serviceModuleId
        required: false
        schema:
          type: string
      - in: query
        name: sourceRootPrefix
        required: false
        schema:
          type: string
      - in: query
        name: packagePrefix
        required: false
        schema:
          type: string
      - in: query
        name: includeWiring
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListEntryTriggerView"
          description: OK
      summary: Inbound entry trigger inventory
      tags:
      - Query — Entry Triggers
  /v1/facts/external-endpoints:
    get:
      description: "Returns config-resolved external and internal partner HTTP targets\
        \ (e.g. Hyvee LMS notify URL, OIS partnerpublishingdetails). Filter by env\
        \ lane, partner slug, or flow step."
      operationId: getExternalEndpoints
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - in: query
        name: repo
        required: false
        schema:
          type: string
          default: ""
      - in: query
        name: env
        required: false
        schema:
          type: string
      - in: query
        name: partner
        required: false
        schema:
          type: string
      - in: query
        name: flowStep
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListExternalEndpointFactView"
          description: External endpoint facts returned
        "202":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListExternalEndpointFactView"
          description: Indexing in progress
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListExternalEndpointFactView"
          description: Service not indexed
      summary: Get external/partner HTTP endpoint facts for a service
      tags:
      - Query — Facts
  /v1/facts/gates:
    get:
      operationId: getGates
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: env
        required: false
        schema:
          type: string
      - in: query
        name: flowStep
        required: false
        schema:
          type: string
      - in: query
        name: refreshLive
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListFlowGateView"
          description: OK
      summary: Flow gate and config facts (C-P6)
      tags:
      - Query — Messaging Flow
  /v1/facts/maven-dependencies:
    get:
      operationId: mavenDependencies
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - in: query
        name: repo
        required: false
        schema:
          type: string
          default: ""
      - in: query
        name: modulePath
        required: false
        schema:
          type: string
      - in: query
        name: scope
        required: false
        schema:
          type: string
          default: runtime
      - in: query
        name: directOnly
        required: false
        schema:
          type: boolean
          default: false
      - in: query
        name: groupId
        required: false
        schema:
          type: string
      - in: query
        name: artifactId
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeMavenDependenciesReport"
          description: OK
      summary: Maven dependency facts for a service
      tags:
      - Query — Maven dependencies
  /v1/facts/message-schema:
    get:
      operationId: getMessageSchemas
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
      - in: query
        name: topicShortId
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListMessageSchemaView"
          description: OK
      summary: Message schema facts (C-P2)
      tags:
      - Query — Messaging Flow
  /v1/facts/outbound:
    get:
      description: "Returns all detected outbound HTTP calls made by the service.\
        \ Includes RestClient/WebClient chain calls, RestTemplate explicit methods,\
        \ and FeignClient interface declarations. `httpMethod` and `path` are null\
        \ when only client field presence was detected (e.g. a dynamic URI in a variable).\
        \ Optionally filtered to a single caller class."
      operationId: getOutboundFacts
      parameters:
      - description: Service identifier
        in: query
        name: serviceId
        required: true
        schema:
          type: string
      - description: Organisation ID
        in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - description: Repository name
        in: query
        name: repo
        required: false
        schema:
          type: string
          default: ""
      - description: Filter by caller class FQN (optional)
        in: query
        name: sourceSymbol
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListOutboundCallView"
          description: Outbound call facts returned
        "202":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListOutboundCallView"
          description: Indexing in progress
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ResponseEnvelopeListOutboundCallView"
          description: Service not indexed
      summary: Get outbound HTTP call facts for a service
      tags:
      - Query — Facts
  /v1/facts/pubsub:
    get:
      operationId: getPubSubInventory
      parameters:
      - in: query
        name: serviceId
        required: true
        schema:
          type: string
