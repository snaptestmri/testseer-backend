  /webhook/github:
    post:
      description: "Accepts GitHub `push` and `pull_request` webhook events. Validates\
        \ the HMAC-SHA256 signature, extracts changed files (including OpenAPI JSON\
        \ via GitHub PR files API when needed), and queues analysis jobs to Kafka.\
        \ Returns 202 Accepted on success."
      operationId: handleWebhook
      parameters:
      - description: "GitHub event type (push, pull_request)"
        in: header
        name: X-GitHub-Event
        required: true
        schema:
          type: string
      - description: HMAC-SHA256 signature for payload verification
        in: header
        name: X-Hub-Signature-256
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: Webhook received but ignored (unsupported event or action)
        "202":
          description: Webhook accepted and queued
        "401":
          description: Invalid HMAC signature
      summary: Receive GitHub webhook
      tags:
      - Webhook
