        in: query
        name: methodName
        required: false
        schema:
          type: string
      - description: Max depth for method traversal (default 6)
        in: query
        name: depth
        required: false
        schema:
          type: integer
          format: int32
          default: 6
      - description: Organisation ID
        in: query
        name: orgId
        required: false
        schema:
          type: string
          default: acme
      - description: Repository name
        in: query
        name: repo
        required: false
