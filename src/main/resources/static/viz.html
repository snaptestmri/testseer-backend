async function runImpact() {
  const svcId = document.getElementById('impact-svc').value;
  const sha   = document.getElementById('impact-sha').value.trim();
  const errEl = document.getElementById('impact-error');
  const resEl = document.getElementById('impact-result');
  errEl.innerHTML = '';
  if (!sha) { errEl.innerHTML = '<div class="error-msg">Enter a commit SHA.</div>'; return; }
  resEl.innerHTML = '<div class="loading">Analyzing…</div>';

  try {
    // GET /v1/impact/pr → ResponseEnvelope<ImpactReport>
    // ImpactReport { serviceId, commitSha, changedSymbols, affectedConsumers,
    //                downstreamDependencies, externalDownstreamDependencies,
    //                suggestedTestScope, missingTestClasses }
    const env = await api(`/v1/impact/pr?serviceId=${svcId}&commitSha=${sha}`);
    const d   = env.data || {};

    const tags = (arr, fn) =>
      arr && arr.length ? arr.map(fn).join('') : '<em style="color:#8b949e">none</em>';

    resEl.innerHTML = `
      <div class="detail-panel">
        <h3>Impact — <span style="font-family:monospace;font-size:13px">${sha.slice(0,8)}</span>
            <span class="svc-status status-${env.freshnessStatus}" style="margin-left:10px">${env.freshnessStatus}</span></h3>

        <div class="impact-section">
          <h4>Changed Symbols (${(d.changedSymbols||[]).length})</h4>
          ${tags(d.changedSymbols, s =>
            `<span class="impact-tag" title="${s.filePath||''}">${s.symbolFqn}${s.httpMethod?` [${s.httpMethod} ${s.path||''}]`:''}</span>`)}
        </div>

        <div class="impact-section">
          <h4>Affected Consumers (${(d.affectedConsumers||[]).length})</h4>
          ${tags(d.affectedConsumers, c =>
            `<span class="impact-tag" title="${c.consumerClass||''}">${c.consumerServiceName||c.consumerServiceId||c.source}</span>`)}
        </div>

        <div class="impact-section">
          <h4>Downstream Dependencies (${(d.downstreamDependencies||[]).length})</h4>
          ${tags(d.downstreamDependencies, c =>
            `<span class="impact-tag">${c.httpMethod||''} ${c.path||''} ← ${c.callerClass||''}</span>`)}
        </div>

        <div class="impact-section">
          <h4>Suggested Tests</h4>
          ${tags(d.suggestedTestScope, t =>
            `<span class="impact-tag ${t.exists?'exists':'missing'}" title="${t.reason||''}">${t.type}: ${t.className}</span>`)}
        </div>

        <div class="impact-section">
          <h4>Missing Test Classes (${(d.missingTestClasses||[]).length})</h4>
          ${tags(d.missingTestClasses, c => `<span class="impact-tag missing">${c}</span>`)}
        </div>
      </div>`;
  } catch(e) {
    errEl.innerHTML = `<div class="error-msg">${e.message}</div>`;
    resEl.innerHTML = '';
  }
}

// ── Journey tab ───────────────────────────────────────────────────────────────
let journeyMode = 'entry';
let eventFlowViewMode = (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('ts-event-flow-view')) || 'pipeline';
let eventFlowFocusServiceId = (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('ts-event-flow-focus')) || '';
let eventFlowHighlightPath = typeof sessionStorage === 'undefined' || sessionStorage.getItem('ts-event-flow-highlight') !== 'false';
let lastEventFlowReport = null;
let lastEventFlowEnvelope = null;
const eventFlowNodePayloads = {};
let eventFlowGraphZoom = null;
let eventFlowGraphSvg = null;

function onEventFlowFocusChange() {
  const el = document.getElementById('journey-focus-svc');
  eventFlowFocusServiceId = el ? el.value : '';
  try { sessionStorage.setItem('ts-event-flow-focus', eventFlowFocusServiceId); } catch (_) {}
  if (lastEventFlowReport) applyEventFlowView(lastEventFlowReport, eventFlowViewMode);
}

function onEventFlowLiveVerifyChange() {
  if (lastEventFlowReport) runJourney();
}

function onEventFlowHighlightChange() {
  const el = document.getElementById('journey-highlight-path');
  eventFlowHighlightPath = el ? el.checked : true;
  try { sessionStorage.setItem('ts-event-flow-highlight', eventFlowHighlightPath ? 'true' : 'false'); } catch (_) {}
  if (lastEventFlowReport && eventFlowViewMode === 'graph') mountEventFlowGraph(lastEventFlowReport);
}

function teardownEventFlowGraph() {
  eventFlowGraphSvg = null;
  eventFlowGraphZoom = null;
}

function setEventFlowView(mode) {
  eventFlowViewMode = mode;
  try { sessionStorage.setItem('ts-event-flow-view', mode); } catch (_) { /* private mode */ }
  document.querySelectorAll('.event-view-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.eventView === mode));
  if (lastEventFlowReport) applyEventFlowView(lastEventFlowReport, mode);
}

function applyEventFlowView(report, mode) {
  teardownEventFlowGraph();
  Object.keys(eventFlowNodePayloads).forEach(k => delete eventFlowNodePayloads[k]);
  const canvas = document.getElementById('journey-canvas');
  if (mode === 'graph') {
    canvas.innerHTML = renderEventFlowGraphShell(report);
    requestAnimationFrame(() => mountEventFlowGraph(report));
  } else {
    canvas.innerHTML = renderEventFlow(report, mode);
  }
}

function populateFocusServiceSelect(report) {
  const sel = document.getElementById('journey-focus-svc');
  if (!sel || !report) return;
  const seen = new Map();
  (report.hops || []).forEach(hop => {
    [...(hop.publishers || []), ...(hop.subscribers || [])].forEach(p => {
      if (p.serviceId && !seen.has(p.serviceId)) seen.set(p.serviceId, p.serviceName || p.serviceId);
    });
  });
  const opts = ['<option value="">All services</option>'];
  [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
    opts.push(`<option value="${esc(id)}"${id === eventFlowFocusServiceId ? ' selected' : ''}>${esc(name)}</option>`);
  });
  sel.innerHTML = opts.join('');
  if (eventFlowFocusServiceId && !seen.has(eventFlowFocusServiceId)) {
    eventFlowFocusServiceId = '';
    try { sessionStorage.setItem('ts-event-flow-focus', ''); } catch (_) {}
  }
}

function setJourneyMode(mode) {
  journeyMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('journey-entry-fields').style.display = mode === 'entry' ? 'flex' : 'none';
  document.getElementById('journey-event-fields').style.display = mode === 'event' ? 'flex' : 'none';
  document.getElementById('journey-flow-fields').style.display = mode === 'flow' ? 'flex' : 'none';
  document.getElementById('journey-canvas').innerHTML = '';
  document.getElementById('journey-error').innerHTML = '';
  if (mode === 'event') {
    syncEventFlowViewButtons();
    const lv = document.getElementById('journey-live-verify');
    const hp = document.getElementById('journey-highlight-path');
    if (hp) hp.checked = eventFlowHighlightPath;
    loadJourneyTopics();
  }
  if (mode === 'flow') {
    const flowSvc = document.getElementById('journey-flow-svc');
    const entrySvc = document.getElementById('journey-svc');
    if (flowSvc && entrySvc) flowSvc.innerHTML = entrySvc.innerHTML;
  }

async function runJourney() {
  const errEl  = document.getElementById('journey-error');
  const canvas = document.getElementById('journey-canvas');
  errEl.innerHTML = '';
  canvas.innerHTML = '<div class="loading">Tracing journey…</div>';

  try {
    if (journeyMode === 'entry') {
      const svcId = document.getElementById('journey-svc').value;
      const path  = document.getElementById('journey-path').value.trim();
      const env   = document.getElementById('journey-env').value;
      const params = new URLSearchParams({ serviceId: svcId, env });
      if (path) params.set(path.startsWith('/') || !path.includes('-') ? 'path' : 'triggerId', path);
      const resp = await api(`/v1/graph/entry-flow?${params}`);
      if (!resp.data || !(resp.data.steps || []).length) {
        canvas.innerHTML = '<div class="loading">No entry triggers found for this service / path. Index the service first or broaden the filter.</div>';
        return;
      }
      canvas.innerHTML = renderEntryFlow(resp.data, allServices.find(s => s.serviceId === svcId));
    } else if (journeyMode === 'flow') {
      const svcId = document.getElementById('journey-flow-svc').value;
      const anchor = document.getElementById('journey-flow-anchor').value.trim();
      const prefix = document.getElementById('journey-flow-prefix').value.trim();
      const svc = allServices.find(s => s.serviceId === svcId);
      if (!anchor) {
        errEl.innerHTML = '<div class="error-msg">Anchor is required (e.g. handlerFqn:com...Consumer.method)</div>';
        canvas.innerHTML = '';
        return;
      }
      const params = new URLSearchParams({
        serviceId: svcId,
        orgId: svc?.orgId || 'quotient',
        anchor,
        format: 'mermaid',
        includeMessaging: 'true',
        includeExternalDomain: 'true',
      });
      if (prefix) params.set('packagePrefix', prefix);
      const resp = await api(`/v1/graph/flow-diagram?${params}`);
      const mermaid = resp.data?.mermaid || '(no mermaid output)';
      const stats = resp.data?.stats;
      const gaps = resp.data?.gaps || [];
      canvas.innerHTML = `
        <div class="pill-row">${stats ? `nodes ${stats.nodeCount} · edges ${stats.edgeCount}` : ''}</div>
        ${gaps.length ? `<div class="error-msg" style="margin-bottom:8px">${gaps.length} messaging gap(s)</div>` : ''}
        <pre style="white-space:pre-wrap;font-size:12px;background:#0d1117;padding:12px;border-radius:6px">${esc(mermaid)}</pre>`;
    } else {
      const orgId   = document.getElementById('journey-org').value.trim();
      const shortId = document.getElementById('journey-topic').value.trim();
      const topicOpt = document.getElementById('journey-topic').selectedOptions[0];
      let env = document.getElementById('journey-env2').value;
      if (!env) env = topicOpt?.dataset?.env || 'pdn';
      if (!orgId || !shortId) {
        errEl.innerHTML = '<div class="error-msg">Org ID and topic short ID are both required.</div>';
        canvas.innerHTML = '';
        return;
      }
      const params = new URLSearchParams({ orgId, shortId, env, maxHops: 12 });
      const followMode = document.getElementById('journey-follow-mode')?.value;
      if (followMode) params.set('followMode', followMode);
      const liveVerify = document.getElementById('journey-live-verify')?.checked;
      if (liveVerify) params.set('liveVerify', 'true');
      const resp = await api(`/v1/graph/event-flow/cross-repo?${params}`);
      if (!resp.data || !(resp.data.hops || []).length) {
        lastEventFlowReport = null;
        lastEventFlowEnvelope = null;
        canvas.innerHTML = '<div class="loading">No hops found for this topic. Make sure the relevant services are indexed.</div>';
        return;
      }
      lastEventFlowReport = resp.data;
      lastEventFlowEnvelope = resp;
      populateFocusServiceSelect(resp.data);
      syncEventFlowViewButtons();
      applyEventFlowView(resp.data, eventFlowViewMode);
    }
  } catch(e) {
    errEl.innerHTML = `<div class="error-msg">${e.message}</div>`;
    canvas.innerHTML = '';
  }
}

// ── Entry flow renderer ────────────────────────────────────────────────────────
/** True when report includes a downstream messaging chain (TRG-12), not a trigger catalog. */
function entryFlowHasMessagingChain(report) {
  const hops = report.crossRepoFlow?.hops;
  const msgSteps = report.messagingFlow?.steps;
  return (hops && hops.length > 0) || (msgSteps && msgSteps.length > 0);
}

/** Independent inbound triggers for one service — not a sequential call chain. */
function entryFlowIsTriggerCatalog(report) {
  const steps = report.steps || [];
  return steps.length > 1 && !entryFlowHasMessagingChain(report);
}

function renderEntryStepCard(step, stepLabel) {
  const t = step.trigger;
  const kindLabel = t.triggerKind || 'TRIGGER';
  const pathLine = t.httpMethod
    ? `${t.httpMethod} ${t.pathPattern || '?'}`
    : (t.pathPattern || t.triggerId || '—');
  const handlerShort = t.linkedHandlerFqn
    ? t.linkedHandlerFqn.split('.').slice(-2).join('.') + (t.linkedMethod ? '.' + t.linkedMethod + '()' : '')
    : null;
  const reads  = (step.reads  || []).map(r =>
    `<div class="db-row db-read">▶ ${esc(r.tableOrEntity || r.storeType || '?')}</div>`).join('');
  const writes = (step.writes || []).map(w =>
    `<div class="db-row db-write">✎ ${esc(w.tableOrEntity || w.storeType || '?')}</div>`).join('');
  const gates  = (step.gates  || []).map(g =>
    `<div class="gate-row">⚑ ${esc(g.gateKey || g.gateKind)} = ${esc(g.requiredValue || '?')}</div>`).join('');
  const actorBit    = t.actor    ? `<span class="actor-badge">${esc(t.actor)}</span>` : '';
  const boundaryBit = t.boundary ? `<span class="boundary-badge">${esc(t.boundary)}</span>` : '';
  const hasData = reads || writes || gates;
  const labelHtml = stepLabel != null
    ? `<div class="step-num">${esc(stepLabel)}</div>`
    : '';

  return `<div class="entry-step">
    <div class="entry-step-card">
      ${labelHtml}
      <span class="trigger-kind-badge">${esc(kindLabel)}</span>${actorBit}${boundaryBit}
      <div class="entry-path">${esc(pathLine)}</div>
      ${handlerShort ? `<div class="entry-handler" title="${esc(t.linkedHandlerFqn || '')}">${esc(handlerShort)}</div>` : ''}
      ${hasData ? `<div style="border-top:1px solid #21262d;margin:8px 0 6px"></div>` : ''}
      ${reads}${writes}${gates}
    </div>
  </div>`;
}

function hopTransport(hop) {
  return (hop && hop.transport) || 'PUBSUB';
}

function transportBadgeHtml(transport) {
  const t = transport || 'PUBSUB';
  const cls = t === 'KAFKA' ? 'transport-kafka' : 'transport-pubsub';
  return `<span class="transport-badge ${cls}">${esc(t)}</span>`;
}

function renderMessagingHopCard(hop, index, topicFallback) {
  const topic = hop.topicShortId || topicFallback || reportTopicFromHop(hop);
  const transport = hopTransport(hop);
  const handler = hop.handler || hop.workload || null;
  const handlerShort = handler
    ? String(handler).split('.').slice(-2).join('.')
    : null;
  return `<div class="entry-step">
    <div class="entry-step-card">
      <div class="step-num">Hop ${index}</div>
      ${transportBadgeHtml(transport)}
      <div class="entry-path">${esc(topic || '—')}</div>
      ${handlerShort ? `<div class="entry-handler">${esc(handlerShort)}</div>` : ''}
    </div>
  </div>`;
}

function reportTopicFromHop(hop) {
  if (hop.topicShortId) return hop.topicShortId;
  const pub = (hop.publishers || [])[0];
  const sub = (hop.subscribers || [])[0];
  return pub?.shortId || sub?.shortId || null;
}

function entryFlowMessagingHops(report) {
  const crossRepo = report.crossRepoFlow?.hops || [];
  if (crossRepo.length) return crossRepo;
  return report.messagingFlow?.steps || [];
}

function renderEntryFlow(report, svc) {
  const svcName = svc ? svc.serviceName : report.serviceId;
  const steps   = report.steps || [];
  const catalog = entryFlowIsTriggerCatalog(report);
  const msgHops = entryFlowMessagingHops(report);
  const hasChain = msgHops.length > 0;
  const containerClass = catalog ? 'entry-catalog' : 'entry-pipeline';
  const subLabel = catalog
    ? `${steps.length} independent entry trigger${steps.length !== 1 ? 's' : ''}`
    : `${steps.length} trigger${steps.length !== 1 ? 's' : ''}${hasChain ? ' · linked chain' : ''}`;

  let html = `<div class="journey-meta">
    <span class="title">${esc(svcName)}</span>
    <span class="sub">${esc(report.envLane || 'pdn')} · ${subLabel}</span>
  </div><div class="${containerClass}">`;

  steps.forEach(step => {
    const label = catalog ? null : `Step ${step.order}`;
    html += renderEntryStepCard(step, label);
  });

  if (hasChain) {
    const topicHint = report.messagingTopicShortId
      || report.crossRepoFlow?.startTopic
      || report.messagingFlow?.topicShortId
      || null;
    if (steps.length > 0) html += '<div class="step-arrow">→</div>';
    msgHops.forEach((hop, i) => {
      if (i > 0) html += '<div class="step-arrow">→</div>';
      html += renderMessagingHopCard(hop, hop.order != null ? hop.order : i + 1, topicHint);
    });
  }

  html += `</div>`;
  return html;
}

function syncEventFlowViewButtons() {
  document.querySelectorAll('.event-view-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.eventView === eventFlowViewMode));
}

function getEventFlowFocusId() {
  return eventFlowFocusServiceId || null;
}

function hopTouchesFocus(hop, focusId) {
  if (!focusId) return true;
  return [...(hop.publishers || []), ...(hop.subscribers || [])].some(p => p.serviceId === focusId);
}

function participantNodeId(role, order, serviceId, idx) {
  return `${role === 'pub' ? 'pub' : 'sub'}:${order}:${serviceId}:${idx}`;
}

function liveVerifyDotHtml(live) {
  if (!live || !live.status) return '';
  if (live.status === 'OK') return '<span class="live-dot ok" title="GCP OK"></span>';
  if (live.status === 'SKIPPED' || live.status === 'DISABLED') return '<span class="live-dot skip" title="GCP verify skipped"></span>';
  const tip = esc(live.status + (live.liveTopicShortId ? ': ' + live.liveTopicShortId : ''));
  return `<span class="live-dot bad" title="${tip}"></span>`;
}

function handlerShortName(fqn) {
  if (!fqn) return null;
  return String(fqn).split('.').slice(-2).join('.');
}

function participantResourceLabel(p, hopTopic, role) {
  if (role === 'sub' && p.shortId) return p.shortId;
  if (role === 'pub') return hopTopic || p.shortId || p.role || 'PUBLISH';
  return p.shortId || p.workloadName || p.role || '—';
}

function hintBadgesHtml(hints) {
  return (hints || []).map(h =>
    `<span class="hint-badge" title="${esc(h.scenarioId || '')}">🔁 ${esc(h.pattern || h.scopeKind || 'consistency')}</span>`
  ).join('');
}

function gapBadgeTitle(g) {
  const parts = [];
  if (g.hopOrder != null) parts.push('hop ' + g.hopOrder);
  if (g.topicShortId) parts.push(g.topicShortId);
  if (g.description) parts.push(g.description);
  return parts.join(' · ') || g.gapType || '';
}

function gapsForHop(gaps, hop) {
  if (!gaps) return [];
  const topicShortId = typeof hop === 'string' ? hop : hop.topicShortId;
  const hopOrder = typeof hop === 'object' && hop != null ? hop.order : null;
  if (!topicShortId && hopOrder == null) return [];
  return gaps.filter(g =>
    (hopOrder != null && g.hopOrder === hopOrder)
    || (topicShortId && g.topicShortId === topicShortId)
    || (topicShortId && (g.description || '').includes(topicShortId)));
}

function renderEventFlowNarrative(report) {
  const lines = report.narrative || [];
  if (!lines.length) return '';
  const text = lines.join('\n');
  return `<details class="event-flow-narrative" open>
    <summary>Trace summary (${lines.length} lines)</summary>
    <pre>${esc(text)}</pre>
  </details>`;
}

function renderEventFlowTraceMeta(report) {
  const parts = [];
  if (report.followMode) {
    parts.push(`<span class="pill">followMode=${esc(report.followMode)}</span>`);
  }
  if (report.skippedExpansionCount != null && report.skippedExpansionCount > 0) {
    parts.push(`<span class="pill">skipped ${report.skippedExpansionCount} manifest expansion(s)</span>`);
  }
  if ((report.traceWarnings || []).length) {
    parts.push(`<span class="pill" title="${esc(report.traceWarnings.join('\n'))}">⚠ ${report.traceWarnings.length} warning(s)</span>`);
  }
  if (!parts.length) return '';
  return `<div class="event-flow-trace-meta">${parts.join('')}</div>`;
}

function renderEventFlowHopSummaries(report) {
  const summaries = report.hopSummaries || [];
  if (!summaries.length) return '';
  const rows = summaries.map(h =>
    `<div class="summary-line" title="Hop ${h.order}">${esc(h.summaryLine || h.topicShortId || '')}</div>`
  ).join('');
  return `<details class="event-flow-hop-summaries">
    <summary>Hop summaries (${summaries.length})</summary>
    ${rows}
  </details>`;
}

function collectFirstHopInboundTriggers(hops) {
  const seen = new Set();
  const out = [];
  for (const sub of ((hops[0] || {}).subscribers || [])) {
    for (const t of (sub.inboundTriggers || [])) {
      const key = t.triggerId || `${t.triggerKind}:${t.pathPattern}`;
      if (!seen.has(key)) { seen.add(key); out.push(t); }
    }
  }
  return out;
}

function renderEventFlowParticipant(p, role, hopTopic, nodeId, focusId) {
  const svcName = p.serviceName || p.repo || p.serviceId || '—';
  const res = participantResourceLabel(p, hopTopic, role);

  const hints = role === 'sub' ? hintBadgesHtml(p.consistencyHints) : '';
  const live = role === 'sub' ? liveVerifyDotHtml(p.liveVerification) : '';
  const title = [p.linkedClassFqn, p.repo, p.evidenceSource].filter(Boolean).join(' · ');
  const roleIcon = role === 'pub' ? '↑' : '↓';
  const fid = focusId != null ? focusId : getEventFlowFocusId();
  const dim = fid && p.serviceId !== fid ? ' event-dimmed' : '';
  if (nodeId) eventFlowNodePayloads[nodeId] = { role, participant: p, hopTopic };
  const click = nodeId ? ` onclick="showEventFlowDetail('${String(nodeId).replace(/'/g, "\\'")}')"` : '';
  return `<div class="event-participant ${role}${dim}" title="${esc(title)}"${click}>
    <span class="event-participant-role">${roleIcon}</span>

      <div class="event-participant-svc">${esc(svcName)}${live}</div>
      <div class="event-participant-res">${esc(res)}</div>

}

function renderMatrixCell(pubs, subs, hopTopic, focusId) {
  const fid = focusId != null ? focusId : getEventFlowFocusId();
  const chips = [];
  (pubs || []).forEach(p => {
    const dim = fid && p.serviceId !== fid ? ' event-dimmed' : '';
    const res = participantResourceLabel(p, hopTopic, 'pub');
    const handler = handlerShortName(p.linkedClassFqn);
    chips.push(`<div class="matrix-chip pub${dim}" title="${esc(p.linkedClassFqn || '')}">↑ ${esc(p.serviceName || p.serviceId)}
      <span class="matrix-chip-res">${esc(res)}${handler ? ' · ' + esc(handler) : ''}</span></div>`);
  });
  (subs || []).forEach(p => {

async function loadEventFlowParticipantFacts(payload, panel) {
  const extra = panel.querySelector('#event-flow-facts-extra');
  if (!extra) return;
  const p = payload.participant;
  if (!p?.serviceId) {
    extra.innerHTML = '';
    return;
  }
  const hopTopic = payload.hopTopic || p.shortId;
  const env = lastEventFlowReport?.envLane || 'pdn';
  try {
    const schemaParams = new URLSearchParams({ serviceId: p.serviceId, topicShortId: hopTopic || '' });
    const gateParams = new URLSearchParams({ serviceId: p.serviceId, env });
    const [schemaResp, gateResp] = await Promise.all([
      api(`/v1/facts/message-schema?${schemaParams}`),
      api(`/v1/facts/gates?${gateParams}`)
    ]);
    extra.innerHTML = renderEventFlowFactsExtra(schemaResp.data || [], gateResp.data || [], p.linkedClassFqn);
  } catch (e) {
    extra.innerHTML = `<span style="color:#f85149">Could not load schemas/gates: ${esc(e.message)}</span>`;
  }
}

function qMsgTypeFromUnpack(unpackExpression) {
  if (!unpackExpression) return null;
  const m = String(unpackExpression).match(/QMsgEvent\.Type\.([A-Z_]+)/);
  return m ? m[1] : null;
}

function parsePayloadFields(raw) {
  if (raw == null || raw === '') return [];
  if (Array.isArray(raw)) return raw;
  try {
    const parsed = JSON.parse(String(raw));
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function renderProtoFieldsTable(fields, maxRows) {
  const limit = maxRows != null ? maxRows : 24;
  const rows = (fields || []).slice(0, limit);
  if (!rows.length) return '';
  let html = '<div class="proto-fields"><table><thead><tr><th>#</th><th>Field</th><th>Type</th></tr></thead><tbody>';
  rows.forEach(f => {
    const num = f.number != null ? f.number : '—';
    const name = f.name || '—';
    const repeated = f.repeated === true || f.repeated === 'true';
    const typeLabel = repeated ? `repeated ${f.type || '?'}` : (f.type || '?');
    html += `<tr><td class="field-num">${esc(String(num))}</td>`;
    html += `<td class="field-name">${esc(name)}</td>`;
    html += `<td class="field-type">${esc(typeLabel)}</td></tr>`;
  });
  html += '</tbody></table>';
  if (fields.length > limit) {
    html += `<div class="proto-fields-more">+ ${fields.length - limit} more field${fields.length - limit !== 1 ? 's' : ''}</div>`;
  }
  html += '</div>';
  return html;
}

function renderEventFlowFactsExtra(schemas, gates, handlerFqn) {
  let html = '';
  const scopedSchemas = schemas.filter(s =>
    !handlerFqn || !s.linkedClassFqn || s.linkedClassFqn === handlerFqn);
  const schemaRows = (scopedSchemas.length ? scopedSchemas : schemas).slice(0, 6);
  if (schemaRows.length) {
    html += '<div style="margin-bottom:8px"><strong style="color:#e6edf3">Message schema</strong></div>';
    schemaRows.forEach(s => {
      const unpackType = qMsgTypeFromUnpack(s.unpackExpression);
      html += `<div class="schema-row">${esc(s.direction || '?')} · ${esc(s.payloadProto || '—')}`;
      if (s.unpackExpression) html += ` · unpack: ${esc(s.unpackExpression)}`;
      html += '</div>';
      if (unpackType) {
        html += `<div class="gate-type-row">QMsgEvent.Type (unpack): ${esc(unpackType)}</div>`;
      }
      const fields = parsePayloadFields(s.payloadFields);
      if (fields.length) {
        html += renderProtoFieldsTable(fields);
      }
    });
  } else {
    html += '<div class="schema-row">No message schema facts for this topic/service.</div>';
  }

  const typeGates = gates.filter(g =>
    g.gateKey === 'QMsgEvent.Type'
    && (!handlerFqn || !g.guardedSymbolFqn || g.guardedSymbolFqn === handlerFqn));
  if (typeGates.length) {
    html += '<div style="margin:10px 0 6px"><strong style="color:#e6edf3">QMsgEvent.Type gates</strong></div>';
    typeGates.forEach(g => {
      html += `<div class="gate-type-row">⚑ ${esc(g.requiredValue || '?')} · ${esc(g.guardedFlowStep || g.gateKind || '')}`;
      if (g.effectWhenFail) html += ` · on fail: ${esc(g.effectWhenFail)}`;
      html += '</div>';
    });
  }
  return html;
}

function eventFlowHasParticipants(hops) {
  return hops.some(h => (h.publishers || []).length || (h.subscribers || []).length);
}

function buildEventFlowGraphModel(report) {
  const nodes = [];
  const edges = [];
  const hops = report.hops || [];
  const entryTriggers = collectFirstHopInboundTriggers(hops);

  // One collapsed entry node (avoids N×M entry edge spaghetti)
  if (entryTriggers.length && hops.length) {
    const entryId = 'entry:anchor';
    const entryLabel = entryTriggers.length === 1
      ? (entryTriggers[0].triggerKind || 'ENTRY')
      : `Entry (${entryTriggers.length})`;
    nodes.push({ id: entryId, type: 'entry', label: entryLabel,
      payload: { role: 'entry', triggers: entryTriggers } });
    eventFlowNodePayloads[entryId] = { role: 'entry', triggers: entryTriggers };

    const order1 = hops[0].order != null ? hops[0].order : 1;
    (hops[0].subscribers || []).forEach((p, si) => {
      if ((p.inboundTriggers || []).length) {
        edges.push({
          kind: 'entry',
          source: entryId,
          target: participantNodeId('sub', order1, p.serviceId, si),
        });
      }
    });
  }

  hops.forEach((hop, hi) => {
    const order = hop.order != null ? hop.order : hi + 1;
    const topicId = `topic:${order}:${hop.topicShortId}`;
    nodes.push({ id: topicId, type: 'topic', label: hop.topicShortId, hopOrder: order, payload: { role: 'topic', hop } });
    eventFlowNodePayloads[topicId] = { role: 'topic', hop };

    (hop.publishers || []).forEach((p, pi) => {
      const id = participantNodeId('pub', order, p.serviceId, pi);
      nodes.push({ id, type: 'publisher', label: p.serviceName || p.serviceId, serviceId: p.serviceId, hopOrder: order,
        payload: { role: 'pub', participant: p, hopTopic: hop.topicShortId } });
      edges.push({ kind: 'publish', source: id, target: topicId });
      eventFlowNodePayloads[id] = { role: 'pub', participant: p, hopTopic: hop.topicShortId };
    });

    (hop.subscribers || []).forEach((p, si) => {
      const id = participantNodeId('sub', order, p.serviceId, si);
      nodes.push({ id, type: 'subscriber', label: p.serviceName || p.serviceId, serviceId: p.serviceId, hopOrder: order,
        payload: { role: 'sub', participant: p, hopTopic: hop.topicShortId } });
      edges.push({ kind: 'subscribe', source: topicId, target: id });
      eventFlowNodePayloads[id] = { role: 'sub', participant: p, hopTopic: hop.topicShortId };
    });

    (hop.terminalContinuations || []).forEach((c, ci) => {
      const id = `term:${order}:${ci}`;
      nodes.push({ id, type: 'terminal', label: c.cronJobName || c.triggerKind || 'terminal', hopOrder: order,
        payload: { role: 'terminal', continuation: c } });
      eventFlowNodePayloads[id] = { role: 'terminal', continuation: c };
      const candidates = (hop.subscribers || []).filter(p => !c.serviceId || p.serviceId === c.serviceId);
      const linkFrom = (candidates.length ? candidates : (hop.subscribers || []).slice(0, 1))[0];
      if (linkFrom) {
        const si = (hop.subscribers || []).indexOf(linkFrom);
        edges.push({ kind: 'terminal', source: participantNodeId('sub', order, linkFrom.serviceId, si), target: id });
      }
    });
  });

  for (let i = 0; i < hops.length - 1; i++) {
    const subs = hops[i].subscribers || [];
    const pubs = hops[i + 1].publishers || [];
    const oN = hops[i].order != null ? hops[i].order : i + 1;
    const oN1 = hops[i + 1].order != null ? hops[i + 1].order : i + 2;
    subs.forEach((s, si) => {
      pubs.forEach((p, pi) => {
        if (s.serviceId === p.serviceId) {
          edges.push({
            kind: 'handoff',
            source: participantNodeId('sub', oN, s.serviceId, si),
            target: participantNodeId('pub', oN1, p.serviceId, pi),
          });
        }
      });
    });
  }

  const tracePathNodeIds = computePrimaryTracePath(hops, edges);

  return { nodes, edges, tracePathNodeIds };
}

/** Single BFS chain: one pub/sub handoff per hop (not all fan-out participants). */
function computePrimaryTracePath(hops, edges) {
  const path = new Set();
  if (!hops.length) return [];

  const handoffs = edges.filter(e => e.kind === 'handoff');
  let carrySubId = null;

  for (let i = 0; i < hops.length; i++) {
    const order = hops[i].order != null ? hops[i].order : i + 1;
    const topicId = `topic:${order}:${hops[i].topicShortId}`;
    path.add(topicId);

    if (carrySubId) {
      const ho = handoffs.find(e => e.source === carrySubId && e.target.startsWith(`pub:${order}:`));
      if (ho) {
        path.add(ho.source);
        path.add(ho.target);
      }
      carrySubId = null;
    } else if (i === 0) {
      const pub = edges.find(e => e.kind === 'publish' && e.target === topicId);
      if (pub) path.add(pub.source);
    }

    const subs = edges.filter(e => e.kind === 'subscribe' && e.source === topicId);
    let chosenSub = null;
    if (i < hops.length - 1 && handoffs.length) {
      const nextOrder = hops[i + 1].order != null ? hops[i + 1].order : i + 2;
      chosenSub = subs.find(s =>
        handoffs.some(h => h.source === s.target && h.target.startsWith(`pub:${nextOrder}:`))
      ) || subs[0];
    } else {
      chosenSub = subs[0];
    }
    if (chosenSub) {
      path.add(chosenSub.target);
      carrySubId = chosenSub.target;
    }
  }

  return [...path];
}

function layoutEventFlowGraph(model, width, height) {
  const COL_W = 240;
  const ROW_H = 56;
  const topics = model.nodes.filter(n => n.type === 'topic').sort((a, b) => a.hopOrder - b.hopOrder);

  let maxSubs = 1;
  let maxPubs = 1;
  topics.forEach(t => {
    const o = t.hopOrder;
    maxPubs = Math.max(maxPubs, model.nodes.filter(n => n.type === 'publisher' && n.hopOrder === o).length);
    maxSubs = Math.max(maxSubs, model.nodes.filter(n => n.type === 'subscriber' && n.hopOrder === o).length);
  });

  const TOPIC_Y = 50 + maxPubs * ROW_H + 40;
  const PUB_BASE = 50;
  const SUB_BASE = TOPIC_Y + 50;
  const graphHeight = SUB_BASE + maxSubs * ROW_H + 60;

  const entry = model.nodes.find(n => n.type === 'entry');
  topics.forEach((topic, hi) => {
    const x = 90 + hi * COL_W;
    const order = topic.hopOrder;
    topic.x = x;
    topic.y = TOPIC_Y;
    model.nodes.filter(n => n.type === 'publisher' && n.hopOrder === order)
      .forEach((n, i) => { n.x = x; n.y = PUB_BASE + i * ROW_H; });
    model.nodes.filter(n => n.type === 'subscriber' && n.hopOrder === order)
      .forEach((n, i) => { n.x = x; n.y = SUB_BASE + i * ROW_H; });
  });

  if (entry && topics.length) {
    entry.x = topics[0].x;
    entry.y = 24;
  }

  const terminals = model.nodes.filter(n => n.type === 'terminal');
  if (terminals.length && topics.length) {
    const lastX = topics[topics.length - 1].x;
    terminals.forEach((n, i) => {
      n.x = lastX + COL_W * 0.55;
      n.y = SUB_BASE + i * ROW_H;
    });
  }

  model.width = Math.max(width, 90 + topics.length * COL_W + (terminals.length ? COL_W : 80));
  model.height = Math.max(height, graphHeight);
  return model;
}

function renderEventFlowGraphShell(report) {
  const hops = report.hops || [];
  let html = renderEventFlowMeta(report, hops);
  html += `<div class="event-flow-graph-wrap">
    <svg id="event-flow-graph-svg"><defs>
      <marker id="ef-arrow" viewBox="0 -4 10 8" refX="14" refY="0" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,-4L10,0L0,4" fill="#484f58"/>
      </marker>
    </defs></svg>
    <div class="event-flow-graph-controls">
      <button type="button" class="btn" onclick="eventFlowGraphZoomBy(1.25)">＋</button>
      <button type="button" class="btn" onclick="eventFlowGraphZoomBy(0.8)">－</button>
      <button type="button" class="btn" onclick="eventFlowGraphResetZoom()">⌂</button>
    </div>
  </div>
  <div id="event-flow-detail" class="detail-panel" style="display:none;margin-top:12px"></div>`;
  html += renderEventFlowFooter(report, hops, new Set());
  return html;
}

function mountEventFlowGraph(report) {
  const svgEl = document.getElementById('event-flow-graph-svg');
  if (!svgEl || typeof d3 === 'undefined') return;

  const model = layoutEventFlowGraph(buildEventFlowGraphModel(report), svgEl.clientWidth || 900, 460);
  const focusId = getEventFlowFocusId();
  const highlight = eventFlowHighlightPath;
  const traceSet = new Set(model.tracePathNodeIds);

  const svg = d3.select('#event-flow-graph-svg');
  svg.attr('viewBox', `0 0 ${model.width} ${model.height}`);
  svg.selectAll('g.ef-root').remove();
  const g = svg.append('g').attr('class', 'ef-root');

  eventFlowGraphZoom = d3.zoom().scaleExtent([0.15, 3]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(eventFlowGraphZoom);
  eventFlowGraphSvg = svg;

  const nodeById = Object.fromEntries(model.nodes.map(n => [n.id, n]));

  function linkPath(d) {
    const s = nodeById[d.source] || d.source;
    const t = nodeById[d.target] || d.target;
    if (!s || !t || s.x == null || t.x == null) return '';
    if (d.kind === 'handoff') {
      const midX = s.x + Math.max(40, (t.x - s.x) * 0.5);
      return `M${s.x},${s.y} L${midX},${s.y} L${midX},${t.y} L${t.x},${t.y}`;
    }
    if (d.kind === 'entry') {
      const midY = (s.y + t.y) / 2;
      return `M${s.x},${s.y} L${s.x},${midY} L${t.x},${midY} L${t.x},${t.y}`;
    }
    if (Math.abs(s.x - t.x) < 8) {
      return `M${s.x},${s.y} L${t.x},${t.y}`;
    }
    const mx = (s.x + t.x) / 2;
    return `M${s.x},${s.y} C${mx},${s.y} ${mx},${t.y} ${t.x},${t.y}`;
  }

  function edgeDimmed(d) {
    if (focusId) {
      const s = nodeById[d.source];
      const t = nodeById[d.target];
      const sOk = !s || s.type === 'topic' || s.serviceId === focusId || s.type === 'entry';
      const tOk = !t || t.type === 'topic' || t.serviceId === focusId || t.type === 'terminal';
      if (!sOk && !tOk) return true;
    }
    if (highlight && d.kind !== 'handoff' && !traceSet.has(d.source) && !traceSet.has(d.target)) return true;
    if (highlight && d.kind === 'handoff') {
      return !traceSet.has(d.source) && !traceSet.has(d.target);
    }
    return false;
  }

  function nodeDimmed(n) {
    if (focusId && n.serviceId && n.serviceId !== focusId) return true;
    if (focusId && n.type === 'topic') {
      const hop = n.payload?.hop;
      return hop && !hopTouchesFocus(hop, focusId);
    }
    if (highlight && n.type !== 'entry' && n.type !== 'terminal' && !traceSet.has(n.id)) return true;
    return false;
  }

  const visibleEdges = model.edges.filter(e => !edgeDimmed(e));

  g.append('g').selectAll('path')
    .data(visibleEdges).join('path')
    .attr('class', d => `ef-link ${d.kind}`)
    .attr('d', linkPath)
    .attr('marker-end', 'url(#ef-arrow)');

  const nodeG = g.append('g').selectAll('g')
    .data(model.nodes).join('g')
    .attr('class', d => `ef-node${nodeDimmed(d) ? ' dimmed' : ''}`)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .on('click', (e, d) => { e.stopPropagation(); showEventFlowDetail(d.id); });

  nodeG.each(function(d) {
    const sel = d3.select(this);
    if (d.type === 'topic') {
      const transport = hopTransport(d.payload?.hop);
      sel.append('rect').attr('x', -55).attr('y', -18).attr('width', 110).attr('height', 36)
        .attr('rx', 6).attr('fill', '#1f3a5f').attr('stroke', transport === 'KAFKA' ? '#d29922' : '#1f6feb');
      sel.append('text').attr('class', 'ef-topic-label').attr('text-anchor', 'middle').attr('dy', -4)
        .attr('fill', transport === 'KAFKA' ? '#d29922' : '#58a6ff').text(transport);
      sel.append('text').attr('class', 'ef-topic-label').attr('text-anchor', 'middle').attr('dy', 10)
        .text(d.label.length > 16 ? d.label.slice(0, 14) + '…' : d.label);
    } else if (d.type === 'entry') {
      sel.append('rect').attr('x', -42).attr('y', -12).attr('width', 84).attr('height', 24)
        .attr('rx', 4).attr('fill', '#1c2128').attr('stroke', '#58a6ff').attr('stroke-dasharray', '3 2');
      sel.append('text').attr('class', 'ef-node-label').attr('text-anchor', 'middle').attr('dy', 4)
        .text((d.label || '').slice(0, 14));
    } else if (d.type === 'terminal') {
      sel.append('rect').attr('x', -40).attr('y', -12).attr('width', 80).attr('height', 24)
        .attr('rx', 4).attr('fill', 'none').attr('stroke', '#484f58').attr('stroke-dasharray', '4 3');
      sel.append('text').attr('class', 'ef-node-label').attr('text-anchor', 'middle').attr('dy', 4)
        .text((d.label || '').slice(0, 12));
    } else {
      const fill = d.type === 'publisher' ? '#28312a' : d.type === 'subscriber' ? '#212830' : '#1c2128';
      const stroke = d.type === 'publisher' ? '#2ea043' : d.type === 'subscriber' ? '#388bfd' : '#484f58';
      sel.append('circle').attr('r', 14).attr('fill', fill).attr('stroke', stroke);
      if (d.type === 'subscriber' && d.payload?.participant?.liveVerification) {
        const st = d.payload.participant.liveVerification.status;
        if (st && st !== 'OK' && st !== 'SKIPPED' && st !== 'DISABLED') {
          sel.append('circle').attr('r', 17).attr('fill', 'none').attr('stroke', '#f85149').attr('stroke-width', 2);
        } else if (st === 'OK') {
          sel.append('circle').attr('r', 17).attr('fill', 'none').attr('stroke', '#3fb950').attr('stroke-width', 1.5);
        }
      }
      sel.append('text').attr('class', 'ef-node-label').attr('text-anchor', 'middle').attr('dy', 28)
        .text((d.label || '').length > 14 ? d.label.slice(0, 12) + '…' : d.label);
    }
  });

  eventFlowGraphFitView(model);
}

function eventFlowGraphFitView(model) {
  if (!eventFlowGraphSvg || !eventFlowGraphZoom || !model) return;
  const svgEl = document.getElementById('event-flow-graph-svg');
  if (!svgEl) return;
  const vw = svgEl.clientWidth || 900;
  const vh = svgEl.clientHeight || 460;
  const scale = Math.min(vw / model.width, vh / model.height, 1) * 0.92;
  const tx = (vw - model.width * scale) / 2;
  const ty = (vh - model.height * scale) / 2;
  eventFlowGraphSvg.transition().duration(400).call(
    eventFlowGraphZoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

function eventFlowGraphZoomBy(f) {
  if (eventFlowGraphSvg && eventFlowGraphZoom) {
    eventFlowGraphSvg.transition().duration(200).call(eventFlowGraphZoom.scaleBy, f);
  }
}

function eventFlowGraphResetZoom() {
  if (eventFlowGraphSvg && eventFlowGraphZoom) {
    eventFlowGraphSvg.transition().duration(300).call(eventFlowGraphZoom.transform, d3.zoomIdentity);
  }
}

function renderEventFlowPipeline(report) {
  const hops = report.hops || [];
  if (!hops.length || !eventFlowHasParticipants(hops)) {
    return '<div class="loading">No services in this event flow.</div>';
  }

  const hopScopedGapKeys = new Set();
  const focusId = getEventFlowFocusId();
  let html = renderEventFlowMeta(report, hops);
  html += '<div id="event-flow-detail" class="detail-panel" style="display:none;margin-bottom:12px"></div>';
  html += '<div class="entry-pipeline">';

  const entryTriggers = collectFirstHopInboundTriggers(hops);
  if (entryTriggers.length) {
    html += renderEventFlowEntryAnchor(entryTriggers);
    html += '<div class="step-arrow">→</div>';
  }

  hops.forEach((hop, i) => {
    if (i > 0) html += '<div class="step-arrow">→</div>';
    const hopGaps = gapsForHop(report.gaps, hop);
    hopGaps.forEach(g => hopScopedGapKeys.add(g.gapType + ':' + (g.description || '')));
    const hopNum = hop.order != null ? hop.order : i + 1;
    const hopDim = focusId && !hopTouchesFocus(hop, focusId) ? ' event-dimmed-hop' : '';
    html += `<div class="event-hop-card${hopDim}">
      <div class="step-num">Hop ${hopNum}</div>
      <div class="hop-topic">${transportBadgeHtml(hopTransport(hop))}${esc(hop.topicShortId)}</div>`;
    if (hopGaps.length) {
      html += `<div class="event-hop-gaps">${hopGaps.map(g =>
        `<span class="gap-badge" title="${esc(gapBadgeTitle(g))}">⚠ ${esc(g.gapType)}</span>`).join('')}</div>`;
    }
    (hop.publishers || []).forEach((p, pi) => {
      html += renderEventFlowParticipant(p, 'pub', hop.topicShortId, participantNodeId('pub', hopNum, p.serviceId, pi), focusId);
    });
    (hop.subscribers || []).forEach((p, si) => {
      html += renderEventFlowParticipant(p, 'sub', hop.topicShortId, participantNodeId('sub', hopNum, p.serviceId, si), focusId);
    });
    html += '</div>';
  });

  const continuations = hops.flatMap(h => h.terminalContinuations || []);
  if (continuations.length) {
    html += '<div class="step-arrow" style="opacity:0.5">⇢</div>';
    continuations.forEach(c => { html += renderEventFlowContinuationCard(c); });
  }

  html += '</div>';
  html += renderEventFlowFooter(report, hops, hopScopedGapKeys);
  return html;
}

// ── Event flow renderer ────────────────────────────────────────────────────────
function renderEventFlow(report, viewMode) {
  const mode = viewMode || eventFlowViewMode || 'pipeline';
  if (mode === 'matrix') return renderEventFlowMatrix(report);
  if (mode === 'graph') return renderEventFlowGraphShell(report);
  return renderEventFlowPipeline(report);
}

function renderEventFlowMatrix(report) {
  const hops = report.hops || [];

  // Collect all unique services, preserving first-appearance order
  const svcOrder = [];
  const svcMeta  = new Map(); // serviceId → { name, repo }
  hops.forEach(hop => {
    [...(hop.publishers || []), ...(hop.subscribers || [])].forEach(p => {
      if (!svcMeta.has(p.serviceId)) {
        svcOrder.push(p.serviceId);
        svcMeta.set(p.serviceId, { name: p.serviceName || p.repo || p.serviceId, repo: p.repo });
      }
    });
  });

  if (!svcOrder.length) return '<div class="loading">No services in this event flow.</div>';

  const focusId = getEventFlowFocusId();
  const LABEL_W = 190;
  const HOP_W   = 155;
  const ARROW_W = 36;

  let html = renderEventFlowMeta(report, hops);
  html += `<div class="swimlane-wrap">
  <table class="swimlane-table">
  <colgroup>
    <col style="width:${LABEL_W}px">
    ${hops.map((_,i) => `${i > 0 ? `<col style="width:${ARROW_W}px">` : ''}<col style="width:${HOP_W}px">`).join('')}
  </colgroup>
  <thead><tr>
    <th style="padding:4px 8px;text-align:left;font-size:11px;color:#8b949e;font-weight:500">Service</th>`;

  hops.forEach((hop, i) => {
    if (i > 0) html += `<th class="hop-arrow-cell">→</th>`;
    html += `<th style="padding:4px;text-align:center"><div class="topic-bubble">${transportBadgeHtml(hopTransport(hop))}${esc(hop.topicShortId)}</div></th>`;
  });
  html += `</tr></thead><tbody>`;

  // One row per service
  svcOrder.forEach(svcId => {
    const meta = svcMeta.get(svcId);
    const rowDim = focusId && svcId !== focusId ? ' style="opacity:0.25"' : '';
    const dot  = `<div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${nodeColor(freshness(svcId))}"></div>`;
    html += `<tr${rowDim}>
      <td style="padding:3px 8px 3px 3px">
        <div class="lane-label" title="${esc(svcId)}">${dot}${esc(meta.name)}</div>
      </td>`;

    hops.forEach((hop, i) => {
      if (i > 0) html += `<td class="hop-arrow-cell" style="vertical-align:middle"></td>`;
      const pubs = (hop.publishers  || []).filter(p => p.serviceId === svcId);
      const subs = (hop.subscribers || []).filter(p => p.serviceId === svcId);
      const colDim = focusId && !hopTouchesFocus(hop, focusId) ? ' style="opacity:0.2"' : '';
      const cellHtml = renderMatrixCell(pubs, subs, hop.topicShortId, focusId);
      html += `<td class="matrix-cell"${colDim}>${cellHtml}</td>`;
    });
    html += `</tr>`;
  });

  // External endpoints footer row (if any)
  if ((report.externalEndpoints || []).length) {
    html += `<tr><td style="padding:3px 8px 3px 3px">
      <div class="lane-label" style="color:#8b949e;font-weight:400">🌐 External</div></td>`;
    hops.forEach((_, i) => {
      if (i > 0) html += `<td></td>`;
      html += `<td style="padding:3px"><div class="lane-cell empty"></div></td>`;
    });
    html += `</tr>`;
  }

  html += `</tbody></table></div>`;
  html += renderEventFlowFooter(report, hops, new Set());
  return html;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Expose journey functions globally (guards against async-function hoisting edge cases) ──
window.setJourneyMode = setJourneyMode;
window.setEventFlowView = setEventFlowView;
window.runJourney     = runJourney;
window.loadJourneyTopics = loadJourneyTopics;
window.onJourneyTopicChange = onJourneyTopicChange;
window.showEventFlowDetail = showEventFlowDetail;
window.eventFlowGraphZoomBy = eventFlowGraphZoomBy;
window.eventFlowGraphResetZoom = eventFlowGraphResetZoom;
window.onEventFlowFocusChange = onEventFlowFocusChange;
window.onEventFlowLiveVerifyChange = onEventFlowLiveVerifyChange;
window.onEventFlowHighlightChange = onEventFlowHighlightChange;
window.buildEventFlowGraphModel = buildEventFlowGraphModel;
window.computePrimaryTracePath = computePrimaryTracePath;
window.renderMatrixCell = renderMatrixCell;

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
